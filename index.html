                    experience: "Experience",
                    expRole: "Full Stack Web Developer & ISMS Manager",
                    expCompany: "@ GoApp / Digivents",
                    exp1: "Managing and coordinating software projects as a Project Lead",
                    exp2: "End-to-end development of new web architectures (React.js, .NET Core) for event management, integrating SSO authentication, user registration, email dispatch, e-commerce, booking, electronic voting (Eligo), travel, and accommodation systems",
                    exp3: "Digivents CMS modernization: progressive migration towards a microfrontend architecture powered by RESTful APIs",
                    exp4: "Maintenance, optimization, and refactoring of complex legacy modules in ASP.NET (ASPX) to ensure maximum operational stability",
                    exp5: "Information Security Management System (ISMS) Manager: creating the processes to achieve ISO 27001 certification (with IMQ for the 2025-2027 three-year period)"
                }
            };

            // 2. SELETTORI DOM MAPPA
            const elements = {
                header: document.querySelector("#headerSection"),
                skillsSection: document.querySelector("#skills"),
                contactsSection: document.querySelector("#contacts"),
                devTitle: document.querySelector("#devTitle"),
                subHeroLocation: document.querySelector(".label-subhero-location"),
                subHeroWork: document.querySelector(".label-subhero-work"),
                // Bottoni Navbar Desktop
                navHome: document.querySelector("#navHome"),
                navSkills: document.querySelector("#navSkills"),
                navContacts: document.querySelector("#navContacts"),
                // Componenti Hamburger Mobile Drawer
                menuTrigger: document.querySelector("#menuTrigger"),
                menuClose: document.querySelector("#menuClose"),
                mobileDrawer: document.querySelector("#mobileDrawer"),
                menuOverlay: document.querySelector("#menuOverlay"),
                navHomeMobile: document.querySelector("#navHomeMobile"),
                navSkillsMobile: document.querySelector("#navSkillsMobile"),
                navContactsMobile: document.querySelector("#navContactsMobile"),
                // Contenitori di Struttura Skill
                skillsMainTitle: document.querySelector("#skills h2"),
                frontEndTitle: document.querySelector("#frontEndTitle"),
                backEndTitle: document.querySelector("#backEndTitle"),
                toolsTitle: document.querySelector("#toolsTitle"),
                frontEndContainer: document.querySelector("#frontEndContainer"),
                backEndContainer: document.querySelector("#backEndContainer"),
                toolsContainer: document.querySelector("#toolsContainer"),
                // Esperienza
                experienceSection: document.querySelector("#experience"),
                navExperience: document.querySelector("#navExperience"),
                navExperienceMobile: document.querySelector("#navExperienceMobile"),
                // Elementi Sezione Contatti
                contactsMainTitle: document.querySelector("#contacts h2"),
                linkedinBtn: document.querySelector("#linkedinBtn"), // Corretto ID selettore diretto
                labelEmail: document.querySelector("#emailContact h4"),
                // Tasti di controllo Navbar
                themeToggle: document.querySelector("#themeToggle"),
                themeToggleDarkIcon: document.querySelector("#themeToggleDarkIcon"),
                themeToggleLightIcon: document.querySelector("#themeToggleLightIcon"),
                langToggle: document.querySelector("#langToggle"),
                langText: document.querySelector("#langText"),
                // Array blocchi contatti per dissolvenze sequenziali
                contactBlocks: [
                    document.querySelector("#linkedinContact"),
                    document.querySelector("#cvContact"),
                    document.querySelector("#whatsappContact"),
                    document.querySelector("#emailContact")
                ]
            };

            // STATO APPLICAZIONE
            const config = {
                currentLang: localStorage.getItem('portfolio-lang') || 'it',
                typingSpeed: 50,
                activeSection: "",
                typingTimeout: null
            };

            let idxTitle = 0;

            // Utility asincrona di attesa
            const delay = ms => new Promise(res => setTimeout(res, ms));

            // ==========================================
            // 3. LOGICA CAMBIO TEMA (Sincronizzata con attributo hidden)
            // ==========================================
            function updateThemeUI(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    elements.themeToggleDarkIcon.hidden = true;   // Nasconde la Luna
                    elements.themeToggleLightIcon.hidden = false; // Mostra il Sole
                } else {
                    document.documentElement.classList.remove('dark');
                    elements.themeToggleLightIcon.hidden = true;  // Nasconde il Sole
                    elements.themeToggleDarkIcon.hidden = false;  // Mostra la Luna
                }
            }

            function initTheme() {
                const isDarkStored = localStorage.getItem('color-theme') === 'dark';
                const isDarkSystem = !('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = isDarkStored || isDarkSystem;

                updateThemeUI(isDark);

                elements.themeToggle.addEventListener('click', () => {
                    const isCurrentlyDark = document.documentElement.classList.contains('dark');
                    const newDarkState = !isCurrentlyDark;
                    
                    localStorage.setItem('color-theme', newDarkState ? 'dark' : 'light');
                    updateThemeUI(newDarkState);
                });
            }

            // ==========================================
            // 4. INTERFACCIA INTERNAZIONALE (i18n)
            function updateInterfaceTexts() {
                const lang = config.currentLang;
                const data = translations[lang];

                // Popola i testi della navbar e dei titoli principali
                document.querySelectorAll(".label-home").forEach(el => el.textContent = data.home);
                document.querySelectorAll(".label-skills").forEach(el => el.textContent = data.skills);
                document.querySelectorAll(".label-contacts").forEach(el => el.textContent = data.contacts);
                document.querySelectorAll(".label-experience").forEach(el => el.textContent = data.experience);

                if (elements.skillsMainTitle) elements.skillsMainTitle.textContent = data.skills;
                if (elements.contactsMainTitle) elements.contactsMainTitle.textContent = data.contacts;
                
                // Iniezione testi della sezione Esperienza
                if (document.querySelector(".label-exp-role")) document.querySelector(".label-exp-role").textContent = data.expRole;
                if (document.querySelector(".label-exp-company")) document.querySelector(".label-exp-company").textContent = data.expCompany;
                if (document.querySelector(".label-exp-1")) document.querySelector(".label-exp-1").textContent = data.exp1;
                if (document.querySelector(".label-exp-2")) document.querySelector(".label-exp-2").textContent = data.exp2;
                if (document.querySelector(".label-exp-3")) document.querySelector(".label-exp-3").textContent = data.exp3;
                if (document.querySelector(".label-exp-4")) document.querySelector(".label-exp-4").textContent = data.exp4;
                if (document.querySelector(".label-exp-5")) document.querySelector(".label-exp-5").textContent = data.exp5;

                if (elements.subHeroLocation) {
                    elements.subHeroLocation.innerHTML = data.subHeroLocation;
                }
                if (elements.subHeroWork) {
                    elements.subHeroWork.innerHTML = data.subHeroWork;
                }

                if (elements.frontEndTitle) elements.frontEndTitle.textContent = "Front-end";
                if (elements.backEndTitle) elements.backEndTitle.textContent = "Back-end";
                if (elements.toolsTitle) elements.toolsTitle.textContent = data.toolsTitle;

                if (elements.labelDigivents) elements.labelDigivents.textContent = data.digiventsLabel;
                if (elements.labelGoApp) elements.labelGoApp.textContent = data.goappLabel;
                if (elements.labelPersonal) elements.labelPersonal.textContent = data.personalLabel;

                if (document.querySelector(".label-cv-sub")) document.querySelector(".label-cv-sub").textContent = data.cvSub;
                if (document.querySelector(".label-cv-btn")) document.querySelector(".label-cv-btn").textContent = data.cvBtn;
                if (elements.labelEmail) elements.labelEmail.textContent = data.emailLabel;

                if (elements.linkedinBtn) {
                    const profileBtnText = elements.linkedinBtn.querySelector('.btn-profile-text');
                    if (profileBtnText) profileBtnText.textContent = data.visitProfile;
                }

                document.querySelectorAll(".label-write").forEach(span => span.textContent = data.write);
                document.querySelectorAll(".label-copy").forEach(span => span.textContent = data.copy);
                document.querySelectorAll(".copied").forEach(div => div.textContent = data.copiedMsg);

                if (lang === 'it') {
                    elements.langText.innerHTML = `
                        <img src="img/flag-en.png" alt="English" class="w-4 h-3 object-cover rounded-sm inline-block align-middle shadow-sm">
                        <span class="align-middle">EN</span>
                    `;
                } else {
                    elements.langText.innerHTML = `
                        <img src="img/flag-it.png" alt="Italiano" class="w-4 h-3 object-cover rounded-sm inline-block align-middle shadow-sm">
                        <span class="align-middle">IT</span>
                    `;
                }
            }

            function initLanguage() {
                updateInterfaceTexts();

                elements.langToggle.addEventListener('click', () => {
                    config.currentLang = config.currentLang === 'it' ? 'en' : 'it';
                    localStorage.setItem('portfolio-lang', config.currentLang);
                    updateInterfaceTexts();

                    // Forza il reset del titolo della macchina da scrivere se siamo sulla Home
                    if (config.activeSection === "home" || config.activeSection === "") {
                        clearTimeout(config.typingTimeout);
                        elements.devTitle.textContent = "";
                        idxTitle = 0;
                        typingDevTitle();
                    }
                });
            }

            // ==========================================
            // 5. MACCHINA DA SCRIVERE (Typing Effect)
            // ==========================================
            function typingDevTitle() {
                const currentText = translations[config.currentLang].titleText;
                if (idxTitle < currentText.length) {
                    elements.devTitle.textContent += currentText.charAt(idxTitle);
                    idxTitle++;
                    config.typingTimeout = setTimeout(typingDevTitle, config.typingSpeed);
                }
            }

            // ==========================================
            // 6. RENDERIZZA SKILLS DINAMICHE
            // ==========================================
            function renderSkillsCategory(categoryData, container) {
                const listContainer = container.querySelector('.skill-list');
                listContainer.innerHTML = ""; 
                const fragment = document.createDocumentFragment();
                
                categoryData.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'flex items-center gap-4 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/60 transition-all duration-200 group';
                    wrapper.innerHTML = `
                        <div class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-lg group-hover:scale-110 transition-transform duration-200 overflow-hidden p-1.5 shadow-sm">
                            <img class="max-w-full max-h-full object-contain" src="img/${item.path}" alt="${item.title}">
                        </div>
                        <div class="font-medium text-slate-600 dark:text-slate-400 group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors duration-200">${item.title}</div>
                    `;
                    fragment.appendChild(wrapper);
                });
                listContainer.appendChild(fragment);
            }

            function initSkills() {
                renderSkillsCategory(skills.frontEnd, elements.frontEndContainer);
                renderSkillsCategory(skills.backEnd, elements.backEndContainer);
                renderSkillsCategory(skills.tools, elements.toolsContainer);
            }

            // ==========================================
            // 7. GESTIONE APPUNTI (Copia Clipboard)
            // ==========================================
            function initClipboard() {
                document.querySelectorAll(".copy-btn").forEach(btn => {
                    btn.addEventListener("click", async (e) => {
                        const targetBtn = e.currentTarget;
                        const card = targetBtn.closest('.group');
                        const textToCopy = targetBtn.getAttribute('data-copy');
                        if (!textToCopy) return;

                        try {
                            await navigator.clipboard.writeText(textToCopy);
                            const toast = card.querySelector('.copied');
                            if (toast) {
                                toast.classList.remove('hidden');
                                setTimeout(() => toast.classList.add('hidden'), 2000);
                            }
                        } catch (err) {
                            console.error("Errore durante la copia: ", err);
                        }
                    });
                });
            }

            // ==========================================
            // 8. LOGICA DI NAVIGAZIONE E ANIMAZIONI SEZIONI
            // ==========================================
            async function switchSection(sectionName) {
                if (config.activeSection === sectionName) return;
                config.activeSection = sectionName;

                // Reset classi attive bottoni desktop
                [elements.navHome, elements.navSkills, elements.navExperience, elements.navContacts].forEach(btn => {
                    if(btn) btn.className = "group flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm font-semibold uppercase text-slate-600 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-400 cursor-pointer transition-all";
                });
                // Reset classi attive bottoni mobile
                [elements.navHomeMobile, elements.navSkillsMobile, elements.navExperienceMobile, elements.navContactsMobile].forEach(btn => {
                    if(btn) btn.className = "flex items-center gap-4 px-4 py-3 rounded-xl text-left text-base font-semibold text-slate-600 dark:text-slate-400 cursor-pointer w-full";
                });

                // Nascondi tutte le sezioni principali
                [elements.header, elements.skillsSection, elements.experienceSection, elements.contactsSection].forEach(sec => {
                    if(sec) {
                        sec.classList.add('hidden');
                        sec.classList.remove('opacity-100');
                        sec.classList.add('opacity-0');
                    }
                });

                // Applica stili al blocco attivo
                if (sectionName === "home") {
                    elements.navHome.className = "group flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-bold uppercase transition-all duration-300 bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer";
                    elements.navHomeMobile.className = "flex items-center gap-4 px-4 py-3 rounded-xl text-left text-base font-bold bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer w-full";
                    
                    elements.header.classList.remove('hidden');
                    await delay(50);
                    elements.header.classList.remove('opacity-0');
                    elements.header.classList.add('opacity-100');

                } else if (sectionName === "skills") {
                    elements.navSkills.className = "group flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-bold uppercase transition-all duration-300 bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer";
                    elements.navSkillsMobile.className = "flex items-center gap-4 px-4 py-3 rounded-xl text-left text-base font-bold bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer w-full";
                    
                    elements.skillsSection.classList.remove('hidden');
                    await delay(50);
                    elements.skillsSection.classList.remove('opacity-0');
                    elements.skillsSection.classList.add('opacity-100');

                    const cards = [elements.frontEndContainer, elements.backEndContainer, elements.toolsContainer];
                    cards.forEach(c => { if(c) c.className = "opacity-0 translate-y-4 bg-white dark:bg-slate-900/40 p-6 rounded-2xl border border-slate-200/60 dark:border-emerald-800/40 hover:dark:border-emerald-800 shadow-sm transition-all duration-500"; });
                    
                    for (let i = 0; i < cards.length; i++) {
                        await delay(150);
                        if(cards[i]) cards[i].classList.remove('opacity-0', 'translate-y-4');
                        if(cards[i]) cards[i].classList.add('opacity-100', 'translate-y-0');
                    }

                } else if (sectionName === "experience") {
                    elements.navExperience.className = "group flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-bold uppercase transition-all duration-300 bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer";
                    elements.navExperienceMobile.className = "flex items-center gap-4 px-4 py-3 rounded-xl text-left text-base font-bold bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer w-full";
                    
                    elements.experienceSection.classList.remove('hidden');
                    await delay(50);
                    elements.experienceSection.classList.remove('opacity-0');
                    elements.experienceSection.classList.add('opacity-100');

                } else if (sectionName === "contacts") {
                    elements.navContacts.className = "group flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-bold uppercase transition-all duration-300 bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer";
                    elements.navContactsMobile.className = "flex items-center gap-4 px-4 py-3 rounded-xl text-left text-base font-bold bg-emerald-50/80 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 cursor-pointer w-full";
                    
                    elements.contactsSection.classList.remove('hidden');
                    await delay(50);
                    elements.contactsSection.classList.remove('opacity-0');
                    elements.contactsSection.classList.add('opacity-100');

                    elements.contactBlocks.forEach(b => { if(b) b.className = "opacity-0 translate-y-4 bg-white dark:bg-slate-900/40 p-5 rounded-2xl border border-slate-200/60 dark:border-emerald-800/40 hover:dark:border-emerald-800 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm hover:shadow-md transition-all duration-300 relative group"; });
                    
                    for (let i = 0; i < elements.contactBlocks.length; i++) {
                        await delay(100);
                        if(elements.contactBlocks[i]) elements.contactBlocks[i].classList.remove('opacity-0', 'translate-y-4');
                        if(elements.contactBlocks[i]) elements.contactBlocks[i].classList.add('opacity-100', 'translate-y-0');
                    }
                }
            }

            function toggleMobileMenu(isOpen) {
                if (isOpen) {
                    elements.mobileDrawer.classList.remove('-translate-x-full');
                    elements.menuOverlay.classList.remove('hidden');
                    setTimeout(() => {
                        elements.menuOverlay.classList.remove('opacity-0');
                        elements.menuOverlay.classList.add('opacity-100');
                    }, 10);
                } else {
                    elements.mobileDrawer.classList.add('-translate-x-full');
                    elements.menuOverlay.classList.remove('opacity-100');
                    elements.menuOverlay.classList.add('opacity-0');
                    setTimeout(() => elements.menuOverlay.classList.add('hidden'), 300);
                }
            }

            function initNavigation() {
                // Navigazione Desktop
                elements.navHome.addEventListener('click', () => switchSection('home'));
                elements.navSkills.addEventListener('click', () => switchSection('skills'));
                elements.navContacts.addEventListener('click', () => switchSection('contacts'));

                // Navigazione Mobile + Chiusura automatica drawer al click
                elements.navHomeMobile.addEventListener('click', () => { switchSection('home'); toggleMobileMenu(false); });
                elements.navSkillsMobile.addEventListener('click', () => { switchSection('skills'); toggleMobileMenu(false); });
                elements.navExperience.addEventListener('click', () => switchSection('experience'));
                elements.navExperienceMobile.addEventListener('click', () => { switchSection('experience'); toggleMobileMenu(false); });
                elements.navContactsMobile.addEventListener('click', () => { switchSection('contacts'); toggleMobileMenu(false); });

                // Eventi Drawer Hamburger
                elements.menuTrigger.addEventListener('click', () => toggleMobileMenu(true));
                elements.menuClose.addEventListener('click', () => toggleMobileMenu(false));
                elements.menuOverlay.addEventListener('click', () => toggleMobileMenu(false));
            }

            // ==========================================
            // 9. AVVIO APPLICAZIONE (Bootstrap)
            // ==========================================
            initTheme();
            initLanguage();
            initSkills();
            initClipboard();
            initNavigation();
            
            // Stato iniziale: Home attiva e avvio macchina da scrivere
            switchSection('home');
            typingDevTitle();
        });

    </script>
</body>

</html>
